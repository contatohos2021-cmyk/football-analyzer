<style>
:root{--bg:#05080d;--surface:#080d14;--card:#0c1420;--card2:#101b28;--border:#162030;--border2:#1e3045;--accent:#00d4ff;--accent2:#ff5722;--accent3:#b06aff;--green:#00e676;--yellow:#ffd740;--red:#ff1744;--text:#dce8f5;--muted:#4a6a85;--muted2:#2a4a65}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,212,255,.05),transparent),linear-gradient(rgba(0,212,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.013) 1px,transparent 1px);background-size:auto,50px 50px,50px 50px;pointer-events:none;z-index:0}
header{position:sticky;top:0;z-index:200;background:rgba(5,8,13,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);padding:0 1.5rem;display:flex;align-items:center;gap:12px;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 30px rgba(0,212,255,.35)}
.logo em{color:var(--accent2);font-style:normal}.logo sup{font-family:'Space Grotesk',sans-serif;font-size:9px;color:var(--accent3);letter-spacing:1px;vertical-align:super}
.hright{margin-left:auto;display:flex;align-items:center;gap:10px}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.poll-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.config{background:var(--surface);border-bottom:1px solid var(--border);padding:.6rem 1.5rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:relative;z-index:10}
.config label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
.config input{flex:1;min-width:130px;max-width:240px;background:#040810;border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;transition:border-color .2s}
.config input:focus{outline:none;border-color:var(--accent)}
.cstatus{font-size:11px;font-family:'JetBrains Mono',monospace}
.ok{color:var(--green)}.err{color:var(--red)}.warn{color:var(--yellow)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;border:1px solid transparent;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:'Space Grotesk',sans-serif}
.btn-primary{background:var(--accent);color:#000}.btn-primary:hover{box-shadow:0 0 20px rgba(0,212,255,.4)}
.btn-ghost{background:transparent;color:var(--muted);border-color:var(--border2)}.btn-ghost:hover{color:var(--accent);border-color:var(--accent)}
.btn-trader{background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(176,106,255,.08));color:var(--accent);border-color:rgba(0,212,255,.25)}.btn-trader:hover{box-shadow:0 0 16px rgba(0,212,255,.2)}
.btn-flag{background:rgba(176,106,255,.08);color:var(--accent3);border-color:rgba(176,106,255,.2)}
.btn-sm{padding:4px 10px;font-size:11px}
.nav{display:flex;border-bottom:1px solid var(--border);background:var(--surface);padding:0 1.5rem;position:sticky;top:56px;z-index:190}
.nav-tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-tab.on{color:var(--accent);border-bottom-color:var(--accent)}.nav-tab:hover:not(.on){color:var(--text)}
.nbadge{font-size:9px;background:rgba(176,106,255,.15);color:var(--accent3);padding:1px 5px;border-radius:8px;font-family:'JetBrains Mono',monospace}
.wrapper{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 120px);position:relative;z-index:1}
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;max-height:calc(100vh - 120px);position:sticky;top:96px}
.sb-filters{padding:.75rem;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:7px}
.search-wrap{display:flex;align-items:center;gap:6px;background:#040810;border:1px solid var(--border2);border-radius:5px;padding:6px 10px}
.search-wrap:focus-within{border-color:var(--accent)}
.search-wrap input{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;width:100%}
.search-wrap input::placeholder{color:var(--muted)}
.tab-bar{display:flex;gap:4px}
.tab-btn{flex:1;padding:5px;border-radius:4px;font-size:11px;font-weight:600;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center}
.tab-btn.on{background:rgba(0,212,255,.08);border-color:var(--accent);color:var(--accent)}
.frow{display:flex;gap:5px}
.frow select{flex:1;font-size:11px;padding:4px 7px;border-radius:4px;background:#040810;border:1px solid var(--border2);color:var(--text);cursor:pointer}
.mlist{overflow-y:auto;flex:1}
.mlist::-webkit-scrollbar{width:3px}
.mlist::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.mcard{padding:.8rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative;overflow:hidden}
.mcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:transparent;transition:background .2s}
.mcard:hover{background:rgba(0,212,255,.02)}.mcard.sel{background:rgba(0,212,255,.04)}.mcard.sel::before{background:var(--accent)}.mcard.flagged::before{background:var(--accent3)}
.mcard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.leaguetxt{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.badge{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:700;font-family:'JetBrains Mono',monospace}
.blive{background:rgba(255,23,68,.1);color:var(--red);border:1px solid rgba(255,23,68,.2)}.bpre{background:rgba(0,212,255,.07);color:var(--accent);border:1px solid rgba(0,212,255,.15)}
.trow{display:flex;align-items:center;gap:6px}.tside{flex:1}
.tname{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}.tname.r{text-align:right}
.sc{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);letter-spacing:2px;line-height:1}.vs{font-size:10px;color:var(--muted2)}
.main{padding:1.25rem 1.5rem;overflow-y:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:55vh;gap:12px;color:var(--muted);text-align:center}
.an-header{margin-bottom:1.1rem}
.an-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--text);line-height:1}
.an-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.an-meta span{font-size:11px;color:var(--muted)}
.section{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:1rem;margin-bottom:.75rem}
.sec-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sec-title span{color:var(--accent)}

/* Analise casa/fora */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.split-col{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px}
.split-col h3{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:8px}
.stat-item{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;border-bottom:1px solid rgba(22,32,48,.4)}
.stat-item:last-child{border:none}
.stat-label{color:var(--muted)}.stat-value{font-weight:600;font-family:'JetBrains Mono',monospace}

/* Markets analise */
.markets-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:.75rem}
.market-card{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px}
.mk-title{font-size:11px;font-weight:700;margin-bottom:6px;color:var(--text)}
.mk-opt{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid rgba(22,32,48,.4)}
.mk-opt:last-child{border:none}
.mk-label{color:var(--muted)}.mk-prob{font-weight:700;font-family:'JetBrains Mono',monospace}

/* Analise traders */
.trader-analysis{background:linear-gradient(135deg,rgba(0,212,255,.04),rgba(176,106,255,.025));border:1px solid rgba(0,212,255,.12);border-radius:8px;padding:1.2rem;margin-bottom:.75rem}
.tr-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid rgba(22,32,48,.5)}
.tr-section:last-child{border:none;margin-bottom:0;padding-bottom:0}
.tr-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-weight:700;margin-bottom:6px}
.tr-text{font-size:11px;line-height:1.7;color:rgba(220,232,245,.8)}

.insight-box{background:rgba(0,212,255,.03);border-left:3px solid var(--accent);padding:10px;margin-bottom:8px;border-radius:4px}
.insight-box.warn{border-left-color:var(--yellow);background:rgba(255,215,64,.02)}
.insight-box.risk{border-left-color:var(--red);background:rgba(255,23,68,.02)}
.insight-box.good{border-left-color:var(--green);background:rgba(0,230,118,.02)}
.insight-title{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px;color:var(--accent)}
.insight-title.warn{color:var(--yellow)}.insight-title.risk{color:var(--red)}.insight-title.good{color:var(--green)}
.insight-text{font-size:10px;line-height:1.6;color:var(--text)}

.trader-pick{background:linear-gradient(135deg,rgba(0,230,118,.08),rgba(0,212,255,.05));border:2px solid var(--green);border-radius:8px;padding:12px;margin-bottom:.75rem}
.tp-title{font-size:12px;font-weight:700;color:var(--green);margin-bottom:8px}
.tp-market{font-size:11px;color:var(--text);margin-bottom:4px}
.tp-reason{font-size:10px;color:var(--muted);line-height:1.6;margin-top:6px}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:900px){.wrapper{grid-template-columns:1fr}.sidebar{max-height:none;position:static}.markets-grid{grid-template-columns:1fr}.split-grid{grid-template-columns:1fr}}
</style>

<body>

<header>
  <div class="logo">⚽ Football<em>Trading</em> <sup>PRO TRADER</sup></div>
  <div class="hright">
    <span id="liveInd" style="display:none;align-items:center;gap:5px;font-size:11px;color:var(--muted)"><span class="pulse"></span> ao vivo</span>

</div>

      <div style="font-size:11px;opacity:.5;margin-top:4px">Análise profissional de trader esportivo com dados reais</div>

<script>
const S={tab:'live',matches:[],filtered:[],selected:null,polling:null,connected:false};

function saveKeys(){const k=document.getElementById('aiKey').value;if(k)localStorage.setItem('fba_ai_key',k);}
function loadKeys(){const k=localStorage.getItem('fba_ai_key');if(k)document.getElementById('aiKey').value=k;}

async function apiFetch(path){
  const base=document.getElementById('baseUrl').value.trim().replace(/\/$/,'');
  const r=await fetch(base+path,{signal:AbortSignal.timeout(12000)});
  if(!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

async function safeFetch(path){
  try{return await apiFetch(path);}catch(e){return null;}
}

function toLocalBR(isoDate){
  if(!isoDate) return '';
  const dt=new Date(isoDate);
  const br=new Date(dt.getTime()-3*60*60*1000);
  return br.toISOString().slice(0,16).replace('T',' ');
}

// ── ANÁLISE PRO DE TRADER ─────────────────────────────
const PROMPT_TRADER_PRO=`Você é um TRADER ESPORTIVO PROFISSIONAL de nível elite.

Sua análise NÃO é listagem de estatísticas. É INTERPRETAÇÃO de cenários, LEITURA DE CONTEXTO e RECOMENDAÇÃO DE ENTRADA.

Você analisa:
1. DINÂMICA DA PARTIDA (não apenas números frios)
2. MOMENTUM (está crescendo? decrescendo? mudança de padrão?)
3. OPORTUNIDADES DE MERCADO (onde está o valor real?)
4. RISCO vs. RECOMPENSA (vale a pena entrar? qual é o risco?)

ESTRUTURA DE ANÁLISE OBRIGATÓRIA:

═══ CASA (detalhado) ═══
Últimos 5: forma real
Média gols marcados/sofridos
Pressão ofensiva (chutes, finalizações)
Pressão defensiva (escanteios, cartões)
Momento psicológico (vencendo na liga? precisando de vitória?)
Desempenho EM CASA (últimos 3 em casa)
Fator psicológico (confiante? pressionado?)

═══ VISITANTE (detalhado) ═══
Últimos 5: forma real
Média gols marcados/sofridos  
Capacidade ofensiva FORA (é time que marca fora?)
Capacidade defensiva FORA (sofre gols fora?)
Momento psicológico (vindo de mau momento?)
Desempenho FORA (últimos 3 fora)
Fator psicológico (confiante? com medo?)

═══ AO VIVO (se aplicável) ═══
Momentum REAL (últimos 15 min está diferente?)
Mudança de posse (time mudou a tática?)
Chutes aumentando? Escanteios aumentando?
Qualidade de chances (está gerando chances claras?)
Cartões (há tension field crescendo?)
Próximos 30 min: o que pode acontecer?

═══ MERCADOS COM ANÁLISE ═══
Over 0.5 FT: probabilidade real e POR QUÊ
Over 1.5 FT: probabilidade real e POR QUÊ
Over 2.5 FT: probabilidade real e POR QUÊ
Under 1.5 FT: probabilidade real e POR QUÊ
Under 2.5 FT: probabilidade real e POR QUÊ
BTTS: probabilidade real e POR QUÊ
Vitória Casa/Visitante: probabilidade real e POR QUÊ
Escanteios Over 8/9/10: análise de tendência
Cartões Over 4/5: análise de ambiente

═══ INSIGHTS PROFISSIONAIS ═══
- O que está acontecendo REALMENTE na partida
- O que pode acontecer nos próximos minutos (previsão)
- Qual é a melhor oportunidade agora (TRADER'S PICK)
- Qual é o risco maior (RISCO CRÍTICO)
- Onde está o valor (VALUE EDGE)

═══ FORMATO DE RESPOSTA ═══
(sem markdown, sem asteriscos, sem emojis — apenas texto claro)

ANALISE_CASA: [análise profunda]
ANALISE_VISITANTE: [análise profunda]
ANALISE_AO_VIVO: [se jogo ao vivo: dinâmica, momentum, mudanças]
MERCADOS_ANALISE: [over/under em cada nível COM PROBABILIDADE E RAZÃO]
INSIGHTS: [3-5 insights profissionais sobre o que está acontecendo]
RISCO_CRITICO: [qual é o risco maior? por quê?]
TRADERS_PICK: [qual mercado entrar AGORA e por quê?]
CONFIANCA: [ALTA/MÉDIA/BAIXA — baseado em dados e contexto]`;

async function askClaudeTrader(m, data){
  const key=document.getElementById('aiKey').value.trim();
  if(!key) return null;

  const mode=m.live?`AO VIVO — ${m.minute}° MINUTO`:'PRÉ-JOGO';
  const score=m.live?`PLACAR: ${m.homeGoals}-${m.awayGoals}`:'Não iniciado';

  const sh=data.stats?.[0]?.statistics||[];
  const sa=data.stats?.[1]?.statistics||[];
  const getStat=(arr,t)=>{const s=arr?.find(x=>x.type===t);if(!s||s.value==null)return'—';return s.value;};

  // Montar contexto profundo
  const prompt=`${PROMPT_TRADER_PRO}

═══════════════════════════════════════════════════════════
DADOS DA PARTIDA
═══════════════════════════════════════════════════════════
${m.home} × ${m.away}
${m.league} | ${mode} | ${score}

═══════════════════════════════════════════════════════════
ESTATÍSTICAS EM TEMPO REAL
═══════════════════════════════════════════════════════════
${m.home} — Posse: ${getStat(sh,'Ball Possession')}% | Chutes: ${getStat(sh,'Total Shots')} | Finalizações: ${getStat(sh,'Shots on Goal')} | Escanteios: ${getStat(sh,'Corner Kicks')} | Cartões: ${getStat(sh,'Yellow Cards')}
${m.away} — Posse: ${getStat(sa,'Ball Possession')}% | Chutes: ${getStat(sa,'Total Shots')} | Finalizações: ${getStat(sa,'Shots on Goal')} | Escanteios: ${getStat(sa,'Corner Kicks')} | Cartões: ${getStat(sa,'Yellow Cards')}

═══════════════════════════════════════════════════════════
FORMA RECENTE
═══════════════════════════════════════════════════════════
${m.home} últimos 5: ${(m.homeForm||[]).join('-')||'—'} | Em casa: ${(m.homeFormHome||[]).join('-')||'—'}
${m.away} últimos 5: ${(m.awayForm||[]).join('-')||'—'} | Fora: ${(m.awayFormAway||[]).join('-')||'—'}

═══════════════════════════════════════════════════════════
MÉDIAS REAIS
═══════════════════════════════════════════════════════════
${m.home}: ${m.homeAvgGoals??'—'} gols/jogo | ${m.homeAvgConceded??'—'} sofridos | xG: ${m.homeXG??'—'}
${m.away}: ${m.awayAvgGoals??'—'} gols/jogo | ${m.awayAvgConceded??'—'} sofridos | xG: ${m.awayXG??'—'}
Expected Goals total: ${m.totalExpGoals??'—'} | BTTS histórico: ${m.bttsP??'—'}%

═══════════════════════════════════════════════════════════
DESFALQUES & ESCALAÇÃO
═══════════════════════════════════════════════════════════
${(data.injuries||[]).length?data.injuries.slice(0,5).map(i=>\`• \${i.player?.name||'?'} (\${i.team?.name||'?'})\`).join('\\n'):'Sem desfalques informados'}

═══════════════════════════════════════════════════════════
H2H ÚLTIMOS 5
═══════════════════════════════════════════════════════════
${(data.h2h||[]).slice(0,5).map(f=>{const hg=f.goals?.home??'?',ag=f.goals?.away??'?';return\`\${f.teams?.home?.name} \${hg}-\${ag} \${f.teams?.away?.name}\`}).join('\\n')||'—'}

═══════════════════════════════════════════════════════════
INSTRUÇÕES FINAIS
═══════════════════════════════════════════════════════════
- Não seja genérico. Seja específico e profissional.
- Probabilidades devem ser REALISTAS, não otimistas.
- Explique POR QUE cada mercado, não apenas números.
- Se ao vivo: interprete o momentum real, não o esperado.
- Trader's Pick: identifique A MELHOR oportunidade AGORA.
- Confiança reflete sua convicção nos dados.`;

  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2200,messages:[{role:'user',content:prompt}]})
  });
  const d=await res.json();
  return d?.content?.[0]?.text?.trim()||null;
}

function parseTraderPro(txt){
  if(!txt) return null;
  const get=k=>{const lines=txt.split('\n');const l=lines.find(x=>x.trim().startsWith(k+':'));return l?l.split(':').slice(1).join(':').trim():'';};
  return{
    casa:get('ANALISE_CASA'),
    visitante:get('ANALISE_VISITANTE'),
    aoVivo:get('ANALISE_AO_VIVO'),
    mercados:get('MERCADOS_ANALISE'),
    insights:get('INSIGHTS'),
    riscoCritico:get('RISCO_CRITICO'),
    tradersPick:get('TRADERS_PICK'),
    confianca:get('CONFIANCA')
  };
}

function gs(arr,t){const s=arr?.find(x=>x.type===t);if(!s||s.value==null)return null;if(typeof s.value==='string'&&s.value.includes('%'))return parseInt(s.value);return s.value;}

function parseFixture(f){
  const home=f.teams.home.name,away=f.teams.away.name,league=f.league.name,leagueId=f.league.id,id=f.fixture.id;
  const homeId=f.teams.home.id,awayId=f.teams.away.id;
  const status=f.fixture.status.short,minute=f.fixture.status.elapsed;
  const live=['1H','2H','HT','ET','BT','P'].includes(status);
  const homeGoals=f.goals?.home,awayGoals=f.goals?.away;
  const ftime=toLocalBR(f.fixture.date);
  const sh=f.statistics?.[0]?.statistics||[],sa=f.statistics?.[1]?.statistics||[];
  const homePoss=gs(sh,'Ball Possession')||50,homeShots=gs(sh,'Shots on Goal')||0,awayShots=gs(sa,'Shots on Goal')||0;
  return{id,home,away,homeId,awayId,league,leagueId,minute,live,fixtureTime:ftime,homeGoals,awayGoals,
    homePoss,awayPoss:100-homePoss,homeShots,awayShots,
    homeForm:[],awayForm:[],homeFormHome:[],awayFormAway:[],
    homeAvgGoals:null,homeAvgConceded:null,awayAvgGoals:null,awayAvgConceded:null,
    homeXG:null,homeXGA:null,awayXG:null,awayXGA:null,totalExpGoals:null,bttsP:null,
    round:f.league?.round||'N/D'};
}

async function collectAllData(m, updateStatus){
  const results={stats:null,h2h:null,injuries:null,lineups:null,odds:null,homeForm:null,awayForm:null};

  updateStatus('stats','loading');
  const stats=await safeFetch(`/api/stats/${m.id}`);
  if(stats?.response?.length){results.stats=stats.response;updateStatus('stats','done');}
  else updateStatus('stats','fail');

  updateStatus('h2h','loading');
  const h2hIds=`${m.homeId}-${m.awayId}`;
  if(m.homeId&&m.awayId){
    const h2h=await safeFetch(`/api/h2h/${h2hIds}`);
    if(h2h?.response?.length){results.h2h=h2h.response.slice(0,5);updateStatus('h2h','done');}
    else updateStatus('h2h','fail');
  } else updateStatus('h2h','skip');

  updateStatus('injuries','loading');
  const inj=await safeFetch(`/api/injuries/${m.id}`);
  if(inj?.response?.length){results.injuries=inj.response;updateStatus('injuries','done');}
  else updateStatus('injuries','skip');

  updateStatus('lineups','loading');
  const lin=await safeFetch(`/api/lineups/${m.id}`);
  if(lin?.response?.length){results.lineups=lin.response;updateStatus('lineups','done');}
  else updateStatus('lineups','skip');

  updateStatus('odds','loading');
  const odds=await safeFetch(`/api/odds/${m.id}`);
  if(odds?.response?.length){results.odds=odds.response[0];updateStatus('odds','done');}
  else updateStatus('odds','skip');

  // Dados de forma
  if(m.homeId&&m.awayId){
    const season=new Date().getFullYear();
    const [hf,af]=await Promise.all([
      safeFetch(`/api/form/${m.homeId}?season=${season}&last=10`),
      safeFetch(`/api/form/${m.awayId}?season=${season}&last=10`)
    ]);
    if(hf?.response?.length) results.homeForm=hf.response;
    if(af?.response?.length) results.awayForm=af.response;
  }

  return results;
}

function calcFormStats(fixtures, teamId){
  if(!fixtures||!fixtures.length) return null;
  let totalGoals=0,totalConceded=0,btts=0;
  const form=[],formHome=[],formAway=[];
  fixtures.forEach(f=>{
    const isHome=f.teams?.home?.id===teamId;
    const gf=isHome?(f.goals?.home??0):(f.goals?.away??0);
    const ga=isHome?(f.goals?.away??0):(f.goals?.home??0);
    totalGoals+=gf; totalConceded+=ga;
    const homeWinner=f.teams?.home?.winner,awayWinner=f.teams?.away?.winner;
    const result=isHome?(homeWinner?'W':awayWinner?'L':'D'):(awayWinner?'W':homeWinner?'L':'D');
    form.push(result);
    if(isHome) formHome.push(result); else formAway.push(result);
    if((f.goals?.home||0)>0&&(f.goals?.away||0)>0) btts++;
  });
  const n=fixtures.length;
  return{form:form.slice(-5),formHome:formHome.slice(-3),formAway:formAway.slice(-3),avgGoals:+(totalGoals/n).toFixed(2),avgConceded:+(totalConceded/n).toFixed(2),bttsP:Math.round((btts/n)*100)};
}

async function selectMatch(id){
  S.selected=S.filtered.find(m=>m.id===id)||null;
  renderMatches();if(!S.selected)return;

  document.getElementById('mainPanel').innerHTML=`<div style="text-align:center;padding:2rem;color:var(--muted)"><div style="font-size:24px;margin-bottom:10px">⟳</div>Coletando dados em tempo real...</div>`;

  const tags={stats:'📡 Stats',h2h:'⚔️ H2H',injuries:'🏥 Desfalques',lineups:'📋 Escalação',odds:'💰 Odds'};
  function updateStatus(k,st){}

  const data=await collectAllData(S.selected,updateStatus);

  // Enriquecer com forma real
  if(data.homeForm?.length||data.awayForm?.length){
    const hStats=data.homeForm?.length?calcFormStats(data.homeForm,S.selected.homeId):null;
    const aStats=data.awayForm?.length?calcFormStats(data.awayForm,S.selected.awayId):null;
    if(hStats){
      S.selected.homeForm=hStats.form;
      S.selected.homeFormHome=hStats.formHome;
      S.selected.homeAvgGoals=hStats.avgGoals;
      S.selected.homeAvgConceded=hStats.avgConceded;
    }
    if(aStats){
      S.selected.awayForm=aStats.form;
      S.selected.awayFormAway=aStats.formAway;
      S.selected.awayAvgGoals=aStats.avgGoals;
      S.selected.awayAvgConceded=aStats.avgConceded;
    }
    if(hStats&&aStats){
      const homeExp=(hStats.avgGoals+aStats.avgConceded)/2;
      const awayExp=(aStats.avgGoals+hStats.avgConceded)/2;
      S.selected.totalExpGoals=+(homeExp+awayExp).toFixed(2);
      S.selected.bttsP=Math.round((hStats.bttsP+aStats.bttsP)/2);
      S.selected.homeXG=+homeExp.toFixed(2);
      S.selected.awayXG=+awayExp.toFixed(2);
      S.selected.homeXGA=+aStats.avgConceded.toFixed(2);
      S.selected.awayXGA=+hStats.avgConceded.toFixed(2);
    }
  }

  renderAnalysisLoading(S.selected);

  // Ask Claude
  const key=document.getElementById('aiKey').value.trim();
  if(key){
    try{
      const txt=await askClaudeTrader(S.selected,data);
      const td=parseTraderPro(txt);
      renderAnalysisPro(S.selected,data,td);
    }catch(e){
      document.getElementById('mainPanel').innerHTML=`<div style="color:var(--red)">Erro IA: ${e.message}</div>`;
    }
  } else {
    document.getElementById('mainPanel').innerHTML=`<div style="color:var(--yellow);padding:1rem">Insira sua chave Anthropic para análise PRO</div>`;
  }
}

function renderAnalysisLoading(m){
  document.getElementById('mainPanel').innerHTML=`<div><div style="font-family:'Bebas Neue',sans-serif;font-size:26px;margin-bottom:1rem">${m.home} × ${m.away}</div><div style="color:var(--muted);font-size:11px">Analisando com dados reais...</div></div>`;
}

function renderMatches(){
  const el=document.getElementById('matchList');
  if(!S.filtered.length){el.innerHTML=`<div class="empty-state" style="height:200px"><div style="font-size:26px;opacity:.12">🔍</div></div>`;return;}
  el.innerHTML=S.filtered.map(m=>{
    const badge=m.live?`<span class="badge blive">● ${m.minute}'</span>`:`<span class="badge bpre">${m.fixtureTime.slice(-5)}</span>`;
    return`<div class="mcard ${S.selected?.id===m.id?'sel':''}" onclick="selectMatch(${m.id})">
      <div class="mcard-top"><span class="leaguetxt">🏆 ${m.league}</span>${badge}</div>
      <div class="trow">
        <div class="tside"><div class="tname">${m.home}</div></div>
        <div style="flex:0;"><div class="sc">${m.live?m.homeGoals+'-'+m.awayGoals:'vs'}</div></div>
        <div class="tside" style="text-align:right"><div class="tname">${m.away}</div></div>
      </div>
    </div>`;
  }).join('');
}

function applyFilters(){
  const lg=document.getElementById('leagueSel').value,q=document.getElementById('searchInput').value.toLowerCase();
  S.filtered=S.matches.filter(m=>{
    if(S.tab==='live'&&!m.live)return false;if(S.tab==='prematch'&&m.live)return false;
    if(lg&&String(m.leagueId)!==lg)return false;
    if(q&&!m.home.toLowerCase().includes(q)&&!m.away.toLowerCase().includes(q))return false;
    return true;
  });renderMatches();
}

function switchTab(tab,el){
  S.tab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));el.classList.add('on');
  S.selected=null;document.getElementById('mainPanel').innerHTML=`<div class="empty-state"><div style="font-size:36px;opacity:.12">📊</div></div>`;
  if(S.connected)loadData();
}

async function connect(){
  setStatus('warn','⟳ Conectando...');
  try{
    const data=await apiFetch(S.tab==='live'?'/api/live':'/api/fixtures');
    S.connected=true;S.matches=(data.response||[]).map(parseFixture);
    setStatus('ok','✓ Conectado');applyFilters();
  }catch(e){setStatus('err','✗ Falha na API');}
}

async function loadData(){
  if(!S.connected){connect();return;}
  try{
    const data=await apiFetch(S.tab==='live'?'/api/live':'/api/fixtures');
    S.matches=(data.response||[]).map(parseFixture);applyFilters();
    setStatus('ok',`✓ ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}`);
  }catch(e){setStatus('err','✗ Erro');}
}

function setStatus(t,txt){const el=document.getElementById('cstatus');el.className='cstatus '+t;el.textContent=txt;}

function showPage(p,el){

}
